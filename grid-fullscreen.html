<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Masonry Gallery with Lightbox</title>
    <style>
        /* Base page styling */
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f4f4f5;
            margin: 0;
            padding: 20px;
        }

        /* The Masonry Container */
        .masonry-grid {
            column-count: 3;
            column-gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* The Masonry Items */
        .masonry-item {
            break-inside: avoid;
            margin-bottom: 20px;
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease-in-out;
        }

        .masonry-item:hover {
            transform: translateY(-5px);
        }

        /* Images inside the grid */
        .masonry-item img {
            display: block;
            width: 100%;
            height: auto;
            cursor: zoom-in; /* Let users know they can click to expand */
        }

        /* 
         * Lightbox (Dialog) Styling 
         */
        .lightbox {
            border: none;
            padding: 0;
            background: transparent;
            max-width: 100vw;
            max-height: 100vh;
        }

        /* The dimmed background behind the dialog */
        .lightbox::backdrop {
            background: rgba(0, 0, 0, 0.85);
            cursor: zoom-out; /* Indicate that clicking the background closes it */
        }

        /* The full-screen image inside the lightbox */
        .lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            display: block;
            margin: auto;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            cursor: zoom-out;
            object-fit: contain;
        }

        /* Responsive breakpoints */
        @media (max-width: 900px) {
            .masonry-grid {
                column-count: 2;
            }
        }

        @media (max-width: 600px) {
            .masonry-grid {
                column-count: 1;
            }
        }
    </style>
</head>
<body>

    <div class="masonry-grid">
        <div class="masonry-item">
            <img src="https://picsum.photos/400/600?random=1" alt="Gallery Photo 1">
        </div>
        <div class="masonry-item">
            <img src="https://picsum.photos/400/400?random=2" alt="Gallery Photo 2">
        </div>
        <div class="masonry-item">
            <img src="https://picsum.photos/400/800?random=3" alt="Gallery Photo 3">
        </div>
        <div class="masonry-item">
            <img src="https://picsum.photos/400/500?random=4" alt="Gallery Photo 4">
        </div>
        <div class="masonry-item">
            <img src="https://picsum.photos/400/700?random=5" alt="Gallery Photo 5">
        </div>
        <div class="masonry-item">
            <img src="https://picsum.photos/400/450?random=6" alt="Gallery Photo 6">
        </div>
        <div class="masonry-item">
            <img src="https://picsum.photos/400/650?random=7" alt="Gallery Photo 7">
        </div>
        <div class="masonry-item">
            <img src="https://picsum.photos/400/550?random=8" alt="Gallery Photo 8">
        </div>
    </div>

    <!-- The Lightbox Dialog element -->
    <dialog id="lightbox" class="lightbox">
        <img id="lightbox-img" src="" alt="Full screen preview">
    </dialog>

    <script>
        // Select necessary DOM elements
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const galleryImages = document.querySelectorAll('.masonry-item img');

        // Add click event listeners to all gallery images
        galleryImages.forEach(image => {
            image.addEventListener('click', () => {
                // Set the src of the lightbox image to the clicked image's src
                lightboxImg.src = image.src;
                lightboxImg.alt = image.alt;
                
                // Show the dialog as a modal
                lightbox.showModal();
            });
        });

        // Close the lightbox when clicking anywhere on it (image or backdrop)
        lightbox.addEventListener('click', () => {
            lightbox.close();
            
            // Optional cleanup: clear the src so previous image doesn't flash on next open
            setTimeout(() => {
                lightboxImg.src = '';
            }, 300); // Wait for potential close animations if added later
        });
    </script>
</body>
</html>
